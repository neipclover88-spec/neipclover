<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>📋 문법카드</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c18; --s1: #0e1320; --s2: #141928;
    --b: rgba(255,255,255,.08); --t: #e8eaf0; --m: #6b7394; --m2: #3a4060;
    --blue: #4f8ef7; --green: #27c96e; --amber: #f5a623;
    --mono: 'Barlow Condensed', sans-serif;
    --sans: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--t); font-family: var(--sans); min-height: 100vh; }

  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--b);
    background: var(--s1); position: sticky; top: 0; z-index: 10;
  }
  .hdr-title { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--blue); }
  .hdr-count { font-size: 11px; color: var(--m); }

  /* 카테고리 필터 바 */
  .cat-bar {
    display: flex; gap: 6px; padding: 10px 16px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--s1); border-bottom: 1px solid var(--b);
    position: sticky; top: 49px; z-index: 9;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0; padding: 4px 12px; border-radius: 100px;
    border: 1px solid var(--b); background: var(--s2);
    color: var(--m); font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: var(--sans); transition: all .15s;
    white-space: nowrap;
  }
  .cat-chip.active {
    border-color: var(--blue); background: rgba(79,142,247,.15); color: var(--blue);
  }

  /* 탭 */
  .tabs { display: flex; border-bottom: 1px solid var(--b); background: var(--s1); }
  .tab { flex: 1; padding: 10px; font-size: 12px; font-weight: 600; color: var(--m);
    background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* 카드 뷰 */
  #viewTab { padding: 20px 16px; }
  .card-wrap { perspective: 800px; height: 220px; cursor: pointer; margin-bottom: 16px; }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d; transition: transform .5s ease;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 14px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px; text-align: center; gap: 8px;
  }
  .card-front {
    background: linear-gradient(135deg, rgba(79,142,247,.18), rgba(79,142,247,.06));
    border: 1px solid rgba(79,142,247,.35);
  }
  .card-back {
    background: linear-gradient(135deg, rgba(39,201,110,.15), rgba(39,201,110,.05));
    border: 1px solid rgba(39,201,110,.3);
    transform: rotateY(180deg);
  }
  .card-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .5; }
  .card-cat-badge {
    font-size: 9px; font-weight: 700; padding: 2px 8px;
    border-radius: 100px; background: rgba(79,142,247,.2);
    color: var(--blue); letter-spacing: .5px;
  }
  .card-text { font-size: 18px; font-weight: 700; line-height: 1.5; }
  .card-front .card-label { color: var(--blue); }
  .card-back  .card-label { color: var(--green); }
  .card-front .card-text  { color: var(--t); }
  .card-back  .card-text  { color: var(--t); font-size: 15px; font-weight: 400; }

  .nav-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .nav-btn {
    background: var(--s2); border: 1px solid var(--b); color: var(--t);
    border-radius: 10px; padding: 10px 20px; font-size: 18px; cursor: pointer;
  }
  .nav-count { font-family: var(--mono); font-size: 14px; color: var(--m); }
  .del-btn {
    width: 100%; padding: 10px; background: rgba(231,76,60,.1);
    border: 1px solid rgba(231,76,60,.25); color: #e74c3c;
    border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  .empty-msg { text-align: center; padding: 40px 0; color: var(--m); font-size: 13px; }

  /* 추가 탭 */
  #addTab { padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
  .field-label { font-size: 10px; color: var(--m); letter-spacing: .5px; margin-bottom: 6px; }
  textarea, select {
    width: 100%; background: var(--s2); border: 1px solid var(--b);
    border-radius: 10px; color: var(--t); font-family: var(--sans); font-size: 14px;
    padding: 12px; outline: none; resize: none; line-height: 1.6; transition: border-color .2s;
  }
  textarea:focus, select:focus { border-color: rgba(79,142,247,.5); }
  #frontInp { border-color: rgba(79,142,247,.3); height: 100px; }
  #backInp  { border-color: rgba(39,201,110,.3); height: 130px; }

  /* 카테고리 선택 */
  .cat-select-wrap { position: relative; }
  .cat-select-wrap select { appearance: none; padding-right: 36px; }
  .cat-select-wrap::after {
    content: '▾'; position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%); color: var(--m); pointer-events: none; font-size: 12px;
  }
  /* 커스텀 카테고리 추가 줄 */
  .cat-add-row { display: flex; gap: 8px; }
  .cat-add-input {
    flex: 1; background: var(--s2); border: 1px solid var(--b);
    border-radius: 10px; color: var(--t); font-family: var(--sans); font-size: 13px;
    padding: 9px 12px; outline: none;
  }
  .cat-add-input:focus { border-color: rgba(79,142,247,.5); }
  .cat-add-btn {
    background: rgba(79,142,247,.15); border: 1px solid rgba(79,142,247,.3);
    color: var(--blue); border-radius: 10px; padding: 9px 14px;
    font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    font-family: var(--sans);
  }

  .save-btn {
    padding: 14px; background: rgba(79,142,247,.2); border: 1px solid rgba(79,142,247,.4);
    color: var(--blue); border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background .2s;
  }
  .save-btn:active { background: rgba(79,142,247,.35); }

  /* 목록 탭 */
  #listTab { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    background: var(--s2); border: 1px solid var(--b); border-radius: 10px;
    padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px;
  }
  .list-badge {
    font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 100px;
    background: rgba(79,142,247,.15); color: var(--blue); white-space: nowrap; flex-shrink: 0;
  }
  .list-content { flex: 1; min-width: 0; }
  .list-front { font-size: 13px; font-weight: 700; color: var(--t); margin-bottom: 3px; }
  .list-back  { font-size: 11px; color: var(--m); line-height: 1.5; }
  .list-del {
    background: none; border: none; color: var(--m2); cursor: pointer;
    font-size: 14px; padding: 0; line-height: 1; flex-shrink: 0;
  }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(39,201,110,.9); color: #fff; font-size: 12px; font-weight: 700;
    padding: 8px 18px; border-radius: 20px; z-index: 999;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">📋 국어 문법카드</span>
  <span class="hdr-count" id="hdrCount">0장</span>
</div>

<!-- 카테고리 필터 바 -->
<div class="cat-bar" id="catBar">
  <button class="cat-chip active" onclick="setCatFilter('전체')">전체</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('view')">카드 보기</button>
  <button class="tab" onclick="switchTab('add')">+ 추가</button>
  <button class="tab" onclick="switchTab('list')">목록</button>
</div>

<!-- 카드 보기 -->
<div id="viewTab">
  <div id="emptyMsg" class="empty-msg">카드가 없어요.<br>+ 추가 탭에서 만들어 보세요!</div>
  <div id="cardArea" style="display:none">
    <div class="card-wrap" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-face card-front">
          <div class="card-cat-badge" id="cardCatBadge"></div>
          <div class="card-label">앞면 · 탭하면 뒤집기</div>
          <div class="card-text" id="frontText"></div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">뒷면</div>
          <div class="card-text" id="backText"></div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">‹</button>
      <span class="nav-count" id="navCount">1 / 1</span>
      <button class="nav-btn" onclick="nextCard()">›</button>
    </div>
    <button class="del-btn" onclick="delCard()">이 카드 삭제</button>
  </div>
</div>

<!-- 추가 -->
<div id="addTab" style="display:none">
  <div>
    <div class="field-label">카테고리</div>
    <div class="cat-select-wrap">
      <select id="catSel"></select>
    </div>
  </div>
  <div>
    <div class="field-label">새 카테고리 추가</div>
    <div class="cat-add-row">
      <input class="cat-add-input" id="newCatInp" placeholder="예) 높임법, 시제, 피동사동">
      <button class="cat-add-btn" onclick="addCategory()">추가</button>
    </div>
  </div>
  <div>
    <div class="field-label">앞면 — 문법 개념</div>
    <textarea id="frontInp" placeholder="예) 주체 높임법의 종류"></textarea>
  </div>
  <div>
    <div class="field-label">뒷면 — 설명 / 예시</div>
    <textarea id="backInp" placeholder="예) 선어말 어미 '-시-' 사용&#10;주어가 높임 대상일 때&#10;예) 선생님이 오셨다"></textarea>
  </div>
  <button class="save-btn" onclick="saveCard()">저장하기</button>
</div>

<!-- 목록 -->
<div id="listTab" style="display:none"></div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const FB_CONFIG = {
  apiKey:            "AIzaSyC9QBrj_8YSvT1Nk7CsTPu_vKk-zetdmnU",
  authDomain:        "neipclover88-3db3f.firebaseapp.com",
  databaseURL:       "https://neipclover88-3db3f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "neipclover88-3db3f",
  storageBucket:     "neipclover88-3db3f.firebasestorage.app",
  messagingSenderId: "419747329488",
  appId:             "1:419747329488:web:a506aad1485222c548f5d5",
};
const FB_PATH  = 'bdh3/grammar/국어/cards';
const CAT_PATH = 'bdh3/grammar/국어/categories';

firebase.initializeApp(FB_CONFIG);
const db = firebase.database();

let allCards   = [];
let categories = ['음운', '형태소', '품사', '단어', '문장', '높임법', '시제', '피동사동', '기타'];
let catFilter  = '전체';
let idx        = 0;
let flipped    = false;

// ── 카테고리 로드 ──
db.ref(CAT_PATH).on('value', snap => {
  if (snap.exists()) {
    const v = snap.val();
    categories = Array.isArray(v) ? v : Object.values(v);
  }
  renderCatBar();
  renderCatSel();
});

// ── 카드 로드 ──
db.ref(FB_PATH).on('value', snap => {
  const val = snap.val();
  allCards = val
    ? Object.entries(val).map(([key, v]) => ({key, ...v}))
    : [];
  document.getElementById('hdrCount').textContent = allCards.length + '장';
  idx = 0;
  renderCard();
  renderList();
});

// ── 필터된 카드 ──
function filtered() {
  return catFilter === '전체' ? allCards : allCards.filter(c => c.cat === catFilter);
}

// ── 카테고리 필터 바 ──
function renderCatBar() {
  const bar = document.getElementById('catBar');
  const all = ['전체', ...categories];
  bar.innerHTML = all.map(c => `
    <button class="cat-chip ${c===catFilter?'active':''}" onclick="setCatFilter('${esc(c)}')">${esc(c)}</button>
  `).join('');
}
function setCatFilter(cat) {
  catFilter = cat;
  idx = 0;
  renderCatBar();
  renderCard();
  renderList();
}

// ── 카테고리 선택 셀렉트 ──
function renderCatSel() {
  const sel = document.getElementById('catSel');
  const cur = sel.value || categories[0] || '';
  sel.innerHTML = categories.map(c =>
    `<option value="${esc(c)}" ${c===cur?'selected':''}>${esc(c)}</option>`
  ).join('');
}

// ── 카테고리 추가 ──
function addCategory() {
  const inp = document.getElementById('newCatInp');
  const name = inp.value.trim();
  if (!name) return;
  if (categories.includes(name)) { showToast('이미 있는 카테고리예요'); return; }
  categories.push(name);
  db.ref(CAT_PATH).set(categories).then(() => {
    inp.value = '';
    showToast(name + ' 추가됐어요 ✓');
    renderCatSel();
    // 새 카테고리 선택
    document.getElementById('catSel').value = name;
  });
}

// ── 탭 전환 ──
const TABS = ['view', 'add', 'list'];
function switchTab(name) {
  TABS.forEach(t => {
    document.getElementById(t + 'Tab').style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', TABS[i] === name);
  });
  if (name === 'list') renderList();
  if (name === 'view') renderCard();
}

// ── 카드 뷰 ──
function renderCard() {
  const list = filtered();
  const empty = document.getElementById('emptyMsg');
  const area  = document.getElementById('cardArea');
  if (!list.length) {
    empty.style.display = 'block';
    area.style.display  = 'none';
    return;
  }
  empty.style.display = 'none';
  area.style.display  = 'block';
  idx = Math.min(idx, list.length - 1);
  const c = list[idx];
  document.getElementById('frontText').textContent   = c.front || '';
  document.getElementById('backText').textContent    = c.back  || '';
  document.getElementById('navCount').textContent    = (idx + 1) + ' / ' + list.length;
  document.getElementById('cardCatBadge').textContent = c.cat  || '';
  flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
}
function flipCard() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}
function prevCard() {
  const list = filtered();
  if (!list.length) return;
  idx = (idx - 1 + list.length) % list.length;
  renderCard();
}
function nextCard() {
  const list = filtered();
  if (!list.length) return;
  idx = (idx + 1) % list.length;
  renderCard();
}
function delCard() {
  const list = filtered();
  if (!list.length) return;
  if (!confirm('이 카드를 삭제할까요?')) return;
  db.ref(FB_PATH + '/' + list[idx].key).remove();
  showToast('삭제됐어요');
}

// ── 저장 ──
function saveCard() {
  const front = document.getElementById('frontInp').value.trim();
  const back  = document.getElementById('backInp').value.trim();
  const cat   = document.getElementById('catSel').value || '기타';
  if (!front) { showToast('앞면을 입력해주세요'); return; }
  db.ref(FB_PATH).push({ front, back: back || '', cat }).then(() => {
    document.getElementById('frontInp').value = '';
    document.getElementById('backInp').value  = '';
    showToast('저장됐어요 ✓');
    switchTab('view');
  });
}

// ── 목록 ──
function renderList() {
  const el   = document.getElementById('listTab');
  const list = filtered();
  if (!list.length) {
    el.innerHTML = '<div class="empty-msg">카드가 없어요.</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="list-item">
      <span class="list-badge">${esc(c.cat||'기타')}</span>
      <div class="list-content">
        <div class="list-front">${esc(c.front)}</div>
        <div class="list-back">${esc(c.back)}</div>
      </div>
      <button class="list-del" onclick="delByKey('${c.key}')">✕</button>
    </div>
  `).join('');
}
function delByKey(key) {
  if (!confirm('삭제할까요?')) return;
  db.ref(FB_PATH + '/' + key).remove();
  showToast('삭제됐어요');
}

// ── 유틸 ──
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
