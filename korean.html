<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>국어 학습</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c18;--s1:#0e1320;--s2:#141928;
  --b:rgba(255,255,255,.08);--t:#e8eaf0;--m:#6b7394;--m2:#3a4060;
  --blue:#4f8ef7;--green:#27c96e;--amber:#f5a623;--red:#e74c3c;
  --sans:'Noto Sans KR',sans-serif;--mono:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t);font-family:var(--sans);min-height:100vh;}
button{font-family:var(--sans);cursor:pointer;}

/* 헤더 */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;background:var(--s1);border-bottom:1px solid var(--b);
  position:sticky;top:0;z-index:20;}
.hdr-title{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--blue);}
.hdr-sub{font-size:11px;color:var(--m);}

/* 메인탭 */
.main-tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b);
  position:sticky;top:48px;z-index:19;}
.main-tab{flex:1;padding:11px;font-size:13px;font-weight:700;color:var(--m);
  background:none;border:none;border-bottom:2px solid transparent;transition:all .2s;}
.main-tab.on{color:var(--blue);border-bottom-color:var(--blue);}

/* 공통 칩 */
.chip-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;
  background:var(--s1);border-bottom:1px solid var(--b);}
.chip-bar::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:4px 12px;border-radius:100px;border:1px solid var(--b);
  background:var(--s2);color:var(--m);font-size:11px;font-weight:700;white-space:nowrap;}
.chip.on{border-color:var(--blue);background:rgba(79,142,247,.15);color:var(--blue);}
.chip-amber.on{border-color:var(--amber);background:rgba(245,166,35,.15);color:var(--amber);}

/* 서브탭 */
.sub-tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b);}
.sub-tab{flex:1;padding:9px;font-size:12px;font-weight:600;color:var(--m);
  background:none;border:none;border-bottom:2px solid transparent;transition:all .2s;}
.sub-tab.on{color:var(--green);border-bottom-color:var(--green);}

/* 카드뷰 */
.card-wrap{perspective:800px;height:200px;cursor:pointer;margin-bottom:14px;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;}
.card-inner.flip{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px;text-align:center;gap:8px;}
.c-front{background:linear-gradient(135deg,rgba(79,142,247,.18),rgba(79,142,247,.06));
  border:1px solid rgba(79,142,247,.35);}
.c-back{background:linear-gradient(135deg,rgba(39,201,110,.15),rgba(39,201,110,.05));
  border:1px solid rgba(39,201,110,.3);transform:rotateY(180deg);}
.c-lbl{font-size:9px;letter-spacing:1.5px;opacity:.5;}
.c-cat{font-size:9px;font-weight:700;padding:2px 8px;border-radius:100px;
  background:rgba(79,142,247,.2);color:var(--blue);}
.c-txt{font-size:17px;font-weight:700;line-height:1.5;}
.c-front .c-lbl{color:var(--blue);}
.c-back  .c-lbl{color:var(--green);}
.c-back  .c-txt{font-size:14px;font-weight:400;}

.nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
.nav-btn{background:var(--s2);border:1px solid var(--b);color:var(--t);
  border-radius:10px;padding:9px 18px;font-size:18px;}
.nav-cnt{font-family:var(--mono);font-size:13px;color:var(--m);}

.action-btn{width:100%;padding:9px;border-radius:8px;font-size:12px;
  background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--blue);margin-bottom:7px;}
.del-btn-sm{width:100%;padding:9px;border-radius:8px;font-size:12px;
  background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.25);color:var(--red);}

/* 폼 */
.pad{padding:16px;}
.field-lbl{font-size:10px;color:var(--m);letter-spacing:.5px;margin-bottom:5px;}
textarea,select,input[type=text]{
  width:100%;background:var(--s2);border:1px solid var(--b);
  border-radius:10px;color:var(--t);font-family:var(--sans);font-size:13px;
  padding:11px;outline:none;resize:none;line-height:1.6;}
textarea:focus,select:focus,input[type=text]:focus{border-color:rgba(79,142,247,.5);}
.sel-wrap{position:relative;}
.sel-wrap select{appearance:none;padding-right:30px;}
.sel-wrap::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);
  color:var(--m);pointer-events:none;}
.save-btn{width:100%;padding:13px;background:rgba(79,142,247,.2);
  border:1px solid rgba(79,142,247,.4);color:var(--blue);border-radius:10px;
  font-size:13px;font-weight:700;}

/* 목록 */
.list-pad{padding:12px 16px;display:flex;flex-direction:column;gap:7px;}
.list-card{background:var(--s2);border:1px solid var(--b);border-radius:10px;
  padding:11px 13px;display:flex;align-items:flex-start;gap:9px;}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;
  background:rgba(79,142,247,.15);color:var(--blue);white-space:nowrap;flex-shrink:0;}
.list-del{background:none;border:none;color:var(--m2);font-size:13px;padding:0;flex-shrink:0;}

/* 오답노트 카드 */
.od-card{background:var(--s2);border:1px solid var(--b);border-radius:10px;
  margin-bottom:9px;cursor:pointer;overflow:hidden;}
.od-top{padding:11px 13px;display:flex;align-items:center;gap:9px;}
.od-accent{width:3px;height:34px;border-radius:2px;flex-shrink:0;}
.od-meta{display:flex;gap:5px;align-items:center;margin-bottom:3px;flex-wrap:wrap;}
.od-tag{font-size:10px;background:var(--s1);color:var(--m);padding:1px 6px;border-radius:3px;}
.od-prev{font-size:12px;color:var(--m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.od-exp{padding:11px 13px;border-top:1px solid var(--b);}
.od-row{margin-bottom:8px;}
.od-rlbl{font-size:10px;font-weight:700;margin-bottom:2px;}
.od-rval{font-size:12px;color:var(--m);line-height:1.5;}
.od-img{width:100%;border-radius:8px;margin-bottom:8px;max-height:240px;object-fit:contain;background:var(--s1);}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--s1);border:1px solid var(--b);border-radius:16px;
  width:100%;max-width:480px;padding:20px;display:flex;flex-direction:column;gap:13px;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--m);font-size:20px;padding:0;}

.empty{text-align:center;padding:40px 0;color:var(--m);font-size:13px;}
.add-row{display:flex;gap:7px;margin-top:-7px;}
.add-inp{flex:1;background:var(--s2);border:1px solid var(--b);border-radius:10px;
  color:var(--t);font-family:var(--sans);font-size:13px;padding:9px 11px;outline:none;}
.add-inp:focus{border-color:rgba(79,142,247,.5);}
.add-btn{background:rgba(79,142,247,.15);border:1px solid rgba(79,142,247,.3);color:var(--blue);
  border-radius:10px;padding:9px 13px;font-size:11px;font-weight:700;white-space:nowrap;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(39,201,110,.9);color:#fff;font-size:12px;font-weight:700;
  padding:8px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

#imgZoom{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.95);
  align-items:center;justify-content:center;}
#imgZoom img{max-width:100%;max-height:100%;object-fit:contain;}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">🇰🇷 국어</span>
  <span class="hdr-sub" id="hdrSub">로딩 중...</span>
</div>
<div class="main-tabs">
  <button class="main-tab on" onclick="mainTab('gc')">📋 문법카드</button>
  <button class="main-tab" onclick="mainTab('od')">✏️ 오답노트</button>
</div>

<!-- ===== 문법카드 ===== -->
<div id="sec-gc">
  <div class="chip-bar" id="catBar"></div>
  <div class="sub-tabs">
    <button class="sub-tab on" onclick="gcTab('view')">카드 보기</button>
    <button class="sub-tab" onclick="gcTab('add')">+ 추가</button>
    <button class="sub-tab" onclick="gcTab('list')">목록</button>
  </div>

  <div id="gc-view" class="pad">
    <div id="gcEmpty" class="empty">카드가 없어요.<br>+ 추가 탭에서 만들어보세요!</div>
    <div id="gcArea" style="display:none">
      <div class="card-wrap" onclick="flipCard()">
        <div class="card-inner" id="ci">
          <div class="card-face c-front">
            <div class="c-cat" id="cCat"></div>
            <div class="c-lbl">앞면 · 탭하면 뒤집기</div>
            <div class="c-txt" id="cFront"></div>
          </div>
          <div class="card-face c-back">
            <div class="c-lbl">뒷면</div>
            <div class="c-txt" id="cBack"></div>
          </div>
        </div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" onclick="prevCard()">‹</button>
        <span class="nav-cnt" id="navCnt">1 / 1</span>
        <button class="nav-btn" onclick="nextCard()">›</button>
      </div>
      <button class="action-btn" onclick="openEdit()">이 카드 수정</button>
      <button class="del-btn-sm" onclick="delCard()">이 카드 삭제</button>
    </div>
  </div>

  <div id="gc-add" class="pad" style="display:none">
    <div style="margin-bottom:13px;">
      <div class="field-lbl">카테고리</div>
      <div class="sel-wrap"><select id="catSel"></select></div>
    </div>
    <div style="margin-bottom:13px;">
      <div class="field-lbl">새 카테고리 추가</div>
      <div class="add-row">
        <input class="add-inp" id="newCat" placeholder="예) 높임법, 시제">
        <button class="add-btn" onclick="addCat()">추가</button>
      </div>
    </div>
    <div style="margin-bottom:13px;">
      <div class="field-lbl">앞면 — 개념</div>
      <textarea id="gFront" style="height:90px;border-color:rgba(79,142,247,.3);" placeholder="예) 주체 높임법의 종류"></textarea>
    </div>
    <div style="margin-bottom:13px;">
      <div class="field-lbl">뒷면 — 설명</div>
      <textarea id="gBack" style="height:120px;border-color:rgba(39,201,110,.3);" placeholder="예) 선어말 어미 '-시-' 사용"></textarea>
    </div>
    <button class="save-btn" onclick="saveCard()">저장하기</button>
  </div>

  <div id="gc-list" class="list-pad" style="display:none"></div>
</div>

<!-- ===== 오답노트 ===== -->
<div id="sec-od" style="display:none">
  <div class="chip-bar" id="odChips"></div>
  <div id="odList" class="pad"></div>
</div>

<!-- 수정 모달 -->
<div class="modal-bg" id="editModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <span style="font-size:14px;font-weight:700;color:var(--blue);">카드 수정</span>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div>
      <div class="field-lbl">카테고리</div>
      <div class="sel-wrap"><select id="eCat"></select></div>
    </div>
    <div>
      <div class="field-lbl">앞면</div>
      <textarea id="eFront" style="height:80px;border-color:rgba(79,142,247,.3);"></textarea>
    </div>
    <div>
      <div class="field-lbl">뒷면</div>
      <textarea id="eBack" style="height:110px;border-color:rgba(39,201,110,.3);"></textarea>
    </div>
    <button class="save-btn" onclick="saveEdit()">저장하기</button>
  </div>
</div>

<div id="imgZoom" onclick="this.style.display='none'"><img id="imgSrc"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC9QBrj_8YSvT1Nk7CsTPu_vKk-zetdmnU",
  authDomain:"neipclover88-3db3f.firebaseapp.com",
  databaseURL:"https://neipclover88-3db3f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"neipclover88-3db3f",
  storageBucket:"neipclover88-3db3f.firebasestorage.app",
  messagingSenderId:"419747329488",
  appId:"1:419747329488:web:a506aad1485222c548f5d5"
});
const db = firebase.database();

// ── 경로 ──
const GC   = 'bdh3/grammar/korean/cards';
const CATS = 'bdh3/grammar/korean/cats';
const OD   = 'bdh3_t/timer/odap';
const ODT  = 'bdh3_t/timer/odapTypes';

// ── 상태 ──
let gcCards=[], gcCats=['음운','형태소','품사','단어','문장','높임법','시제','피동사동','기타'];
let gcFilter='전체', gcIdx=0, gcFlip=false, editKey=null;
let odAll=[], odTypes=[], odFilter='전체', odOpen=null;
let curMain='gc', curGc='view';

// ── Firebase 리스너 ──
db.ref(CATS).on('value', s=>{
  if(s.exists()){
    const v=s.val(); gcCats=Array.isArray(v)?v:Object.values(v);
  }
  buildCatBar(); buildCatSel();
});

db.ref(GC).on('value', s=>{
  gcCards=[];
  if(s.exists()){
    Object.entries(s.val()).forEach(([k,v])=>gcCards.push({key:k,...v}));
  }
  updateHdr(); renderCard(); renderList();
});

db.ref(OD).on('value', s=>{
  odAll=[];
  if(s.exists()){
    const v=s.val();
    const arr=Array.isArray(v)?v:Object.values(v);
    odAll=arr.filter(e=>e&&e.subject==='국어').sort((a,b)=>(b.id||0)-(a.id||0));
  }
  updateHdr(); renderOdChips(); renderOdList();
});

db.ref(ODT).on('value', s=>{
  odTypes=[];
  if(s.exists()){const v=s.val();odTypes=Array.isArray(v)?v:Object.values(v);}
  renderOdChips(); renderOdList();
});

function updateHdr(){
  document.getElementById('hdrSub').textContent='문법카드 '+gcCards.length+'장 · 오답 '+odAll.length+'개';
}

// ── 메인 탭 ──
function mainTab(t){
  curMain=t;
  document.getElementById('sec-gc').style.display=t==='gc'?'':'none';
  document.getElementById('sec-od').style.display=t==='od'?'':'none';
  document.querySelectorAll('.main-tab').forEach((el,i)=>el.classList.toggle('on',['gc','od'][i]===t));
}

// ── 문법카드 탭 ──
function gcTab(t){
  curGc=t;
  document.getElementById('gc-view').style.display=t==='view'?'':'none';
  document.getElementById('gc-add').style.display=t==='add'?'':'none';
  document.getElementById('gc-list').style.display=t==='list'?'':'none';
  document.querySelectorAll('.sub-tab').forEach((el,i)=>el.classList.toggle('on',['view','add','list'][i]===t));
  if(t==='view') renderCard();
  if(t==='list') renderList();
}

// ── 카테고리 필터 ──
function buildCatBar(){
  const bar=document.getElementById('catBar');
  bar.innerHTML=['전체',...gcCats].map(c=>
    `<button class="chip ${c===gcFilter?'on':''}" onclick="setFilter('${esc(c)}')">${esc(c)}</button>`
  ).join('');
}
function setFilter(c){gcFilter=c;gcIdx=0;buildCatBar();renderCard();renderList();}

function buildCatSel(){
  ['catSel','eCat'].forEach(id=>{
    const el=document.getElementById(id); if(!el)return;
    const cur=el.value;
    el.innerHTML=gcCats.map(c=>`<option value="${esc(c)}" ${c===cur?'selected':''}>${esc(c)}</option>`).join('');
  });
}

function addCat(){
  const inp=document.getElementById('newCat');
  const name=inp.value.trim();
  if(!name)return;
  if(gcCats.includes(name)){toast('이미 있어요');return;}
  gcCats.push(name);
  db.ref(CATS).set(gcCats).then(()=>{inp.value='';toast(name+' 추가됐어요 ✓');});
}

// ── 카드 렌더 ──
function gcFiltered(){return gcFilter==='전체'?gcCards:gcCards.filter(c=>c.cat===gcFilter);}

function renderCard(){
  const list=gcFiltered();
  document.getElementById('gcEmpty').style.display=list.length?'none':'block';
  document.getElementById('gcArea').style.display=list.length?'block':'none';
  if(!list.length)return;
  gcIdx=Math.max(0,Math.min(gcIdx,list.length-1));
  const c=list[gcIdx];
  document.getElementById('cCat').textContent=c.cat||'';
  document.getElementById('cFront').textContent=c.front||'';
  document.getElementById('cBack').textContent=c.back||'';
  document.getElementById('navCnt').textContent=(gcIdx+1)+' / '+list.length;
  gcFlip=false; document.getElementById('ci').classList.remove('flip');
}
function flipCard(){gcFlip=!gcFlip;document.getElementById('ci').classList.toggle('flip',gcFlip);}
function prevCard(){const l=gcFiltered();if(!l.length)return;gcIdx=(gcIdx-1+l.length)%l.length;renderCard();}
function nextCard(){const l=gcFiltered();if(!l.length)return;gcIdx=(gcIdx+1)%l.length;renderCard();}
function delCard(){
  const l=gcFiltered();if(!l.length){toast('카드가 없어요');return;}
  if(!confirm('삭제할까요?'))return;
  db.ref(GC+'/'+l[gcIdx].key).remove(); toast('삭제됐어요');
}
function saveCard(){
  const front=document.getElementById('gFront').value.trim();
  const back=document.getElementById('gBack').value.trim();
  const cat=document.getElementById('catSel').value||'기타';
  if(!front){toast('앞면을 입력해주세요');return;}
  db.ref(GC).push({front,back,cat}).then(()=>{
    document.getElementById('gFront').value='';
    document.getElementById('gBack').value='';
    toast('저장됐어요 ✓'); gcTab('view');
  });
}

function renderList(){
  const el=document.getElementById('gc-list');
  const list=gcFiltered();
  if(!list.length){el.innerHTML='<div class="empty">카드가 없어요.</div>';return;}
  el.innerHTML=list.map(c=>`
    <div class="list-card">
      <span class="badge">${esc(c.cat||'기타')}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;margin-bottom:3px;">${esc(c.front)}</div>
        <div style="font-size:11px;color:var(--m);line-height:1.5;">${esc(c.back)}</div>
      </div>
      <button class="list-del" onclick="delByKey('${c.key}')">✕</button>
    </div>`).join('');
}
function delByKey(key){
  if(!confirm('삭제할까요?'))return;
  db.ref(GC+'/'+key).remove(); toast('삭제됐어요');
}

// ── 수정 모달 ──
function openEdit(){
  const l=gcFiltered();
  if(!l.length){toast('카드가 없어요');return;}
  const c=l[gcIdx]; editKey=c.key;
  const sel=document.getElementById('eCat');
  sel.innerHTML=gcCats.map(cat=>`<option value="${esc(cat)}" ${cat===c.cat?'selected':''}>${esc(cat)}</option>`).join('');
  document.getElementById('eFront').value=c.front||'';
  document.getElementById('eBack').value=c.back||'';
  document.getElementById('editModal').style.display='flex';
}
function closeEdit(){document.getElementById('editModal').style.display='none';editKey=null;}
function saveEdit(){
  if(!editKey){toast('오류: 수정할 카드가 없어요');return;}
  const front=document.getElementById('eFront').value.trim();
  const back=document.getElementById('eBack').value.trim();
  const cat=document.getElementById('eCat').value||'기타';
  if(!front){toast('앞면을 입력해주세요');return;}
  db.ref(GC+'/'+editKey).update({front,back,cat}).then(()=>{closeEdit();toast('수정됐어요 ✓');});
}
document.getElementById('editModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('editModal')) closeEdit();
});

// ── 오답노트 ──
const BASE_TYPES=[
  {id:'cond',label:'조건어 오독',color:'#f59e0b'},
  {id:'range',label:'적용 범위 오류',color:'#ef4444'},
  {id:'reinterp',label:'선지 재해석',color:'#8b5cf6'},
  {id:'integrate',label:'근거 통합 실패',color:'#3b82f6'},
  {id:'calc',label:'계산 오류',color:'#10b981'},
  {id:'other',label:'기타',color:'#6b7280'},
];
function allTypes(){return [...BASE_TYPES,...odTypes];}
function typeInfo(id){return allTypes().find(t=>t.id===id)||{label:id,color:'#6b7280'};}

function renderOdChips(){
  const bar=document.getElementById('odChips');
  bar.innerHTML=['전체',...allTypes().map(t=>t.id)].map(id=>{
    const lbl=id==='전체'?'전체':typeInfo(id).label;
    return `<button class="chip chip-amber ${id===odFilter?'on':''}" onclick="setOdFilter('${esc(id)}')">${esc(lbl)}</button>`;
  }).join('');
}
function setOdFilter(f){odFilter=f;odOpen=null;renderOdChips();renderOdList();}

function renderOdList(){
  const el=document.getElementById('odList');
  const list=odFilter==='전체'?odAll:odAll.filter(e=>e.errorType===odFilter);
  if(!list.length){
    el.innerHTML='<div class="empty">국어 오답이 없어요.</div>';
    return;
  }
  el.innerHTML=list.map(e=>{
    const t=typeInfo(e.errorType);
    const d=new Date(e.id||0);
    const ds=(d.getMonth()+1)+'/'+(d.getDate());
    const open=odOpen===e.id;
    const exp=open?`<div class="od-exp">
      <div class="od-row"><div class="od-rlbl" style="color:#ef4444">내가 읽은 것</div><div class="od-rval">${esc(e.myRead)}</div></div>
      <div class="od-row"><div class="od-rlbl" style="color:#27c96e">실제 선지/지문</div><div class="od-rval">${esc(e.actual)}</div></div>
      ${e.memo?`<div class="od-row"><div class="od-rlbl" style="color:var(--m)">메모</div><div class="od-rval">${esc(e.memo)}</div></div>`:''}
      ${e.imageUrl?`<img class="od-img" src="${esc(e.imageUrl)}" onclick="event.stopPropagation();zoomImg('${esc(e.imageUrl)}')">`:''}
    </div>`:'';
    return `<div class="od-card" style="${open?'border-color:'+t.color+'55':''}" onclick="toggleOd(${e.id})">
      <div class="od-top">
        <div class="od-accent" style="background:${t.color}"></div>
        <div style="flex:1;min-width:0;">
          <div class="od-meta">
            <span style="font-size:10px;color:var(--m)">${ds}</span>
            ${e.problem?`<span class="od-tag">#${esc(e.problem)}</span>`:''}
            <span style="font-size:10px;font-weight:700;color:${t.color};margin-left:auto">${esc(t.label)}</span>
          </div>
          <div class="od-prev">${esc(e.myRead||'')}</div>
        </div>
        <span style="color:var(--m2);font-size:11px">${open?'▲':'▼'}</span>
      </div>${exp}
    </div>`;
  }).join('');
}
function toggleOd(id){odOpen=odOpen===id?null:id;renderOdList();}
function zoomImg(url){document.getElementById('imgSrc').src=url;document.getElementById('imgZoom').style.display='flex';}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
