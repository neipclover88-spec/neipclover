<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>연우 스케줄</title>
<style>
:root{
  --bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e22;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f2;--text2:#9898a6;--text3:#44444e;
  --accent:#4f8ef7;--accent-bg:rgba(79,142,247,0.15);--accent-bd:rgba(79,142,247,0.4);
  --red:#e24b4a;
  --pxh:44px; /* 1시간 픽셀 높이 */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Pretendard',sans-serif;overscroll-behavior:none}

/* ── 상단 네비 ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
.back-btn{font-size:18px;color:var(--text2);text-decoration:none}
.topbar-title{font-size:15px;font-weight:600;margin-left:8px}
.week-nav{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:2px 6px}
.week-label{font-size:12px;color:var(--text2);min-width:80px;text-align:center}

/* ── 캘린더 ── */
.cal-scroll{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;flex:1}
.cal-inner{display:flex}

/* 시간축 */
.time-col{width:32px;flex-shrink:0;position:relative}
.time-lbl{position:absolute;right:4px;font-size:9px;color:var(--text3);line-height:1;transform:translateY(-50%);white-space:nowrap;pointer-events:none}

/* 요일 헤더 */
.day-headers{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;position:sticky;top:0;z-index:50;background:var(--bg);padding:0 0 4px 0}
.dh{text-align:center;font-size:10px;color:var(--text2);padding:4px 0 2px;line-height:1.3}
.dh .dn{font-size:13px;font-weight:500;display:block;margin-top:1px}
.d-total{display:block;font-size:8px;font-weight:600;color:var(--accent);margin-top:1px;letter-spacing:-0.2px}
.dh.today{color:var(--accent)}
.dh.today .dn{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}

/* 타임라인 그리드 */
.tl-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;flex:1;position:relative}
.tl-col{position:relative;border-left:0.5px solid rgba(255,255,255,0.12)}
.tl-col:first-child{border-left:none}

/* 시간 수평선 */
.h-line{position:absolute;left:0;right:0;height:0.5px;pointer-events:none}
.h-line.major{background:rgba(255,255,255,0.07)}
.h-line.minor{background:rgba(255,255,255,0.03)}
.h-line.zone{background:rgba(255,255,255,0.18);height:1px}

/* 구역 배경 */
.zone-bg{position:absolute;left:0;right:0;pointer-events:none}

/* 현재시각 선 */
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:30;pointer-events:none}
.now-dot{position:absolute;left:-3px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--red)}

/* 세션 블록 */
.sblock{position:absolute;left:2px;right:2px;border-radius:4px;border-left:3px solid;overflow:hidden;cursor:grab;user-select:none;touch-action:none;z-index:10}
.sblock.dragging{opacity:0.5;z-index:50;cursor:grabbing}
.sblock-inner{padding:3px 5px 2px;height:100%}
.sblock-label{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.sblock-time{font-size:9px;opacity:0.75;line-height:1.2}
.sblock-bar-wrap{height:3px;border-radius:2px;overflow:hidden;margin-top:3px;background:rgba(0,0,0,0.2)}
.sblock-bar-fill{height:100%;border-radius:2px}
/* 리사이즈 핸들 */
.resize-handle{position:absolute;left:0;right:0;height:8px;z-index:20;cursor:ns-resize;opacity:0}
.resize-handle.top{top:0}
.resize-handle.bot{bottom:0}

/* 드래그 고스트 */
.drag-ghost{position:fixed;pointer-events:none;z-index:999;border-radius:4px;border-left:3px solid;padding:4px 6px;font-size:10px;font-weight:700;opacity:0.9;box-shadow:0 4px 16px rgba(0,0,0,0.5)}

/* ── 구분선 ── */
.divider{display:flex;align-items:center;gap:8px;padding:10px 12px 6px}
.divider span{font-size:11px;color:var(--text3);font-weight:500}
.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}



/* ── 링크 ── */
.qlinks{display:flex;gap:8px;padding:0 10px 16px}
.qlink{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;text-decoration:none}

/* ── 모달 ── */
.mback{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;justify-content:center}
.mback.open{display:flex}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;border-top:0.5px solid var(--border2);padding:16px 16px 32px;width:100%;max-width:600px}
.mhandle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 14px}
.mtitle{font-size:14px;font-weight:600;margin-bottom:14px}
.mrow{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.mlbl{font-size:12px;color:var(--text2);width:40px;flex-shrink:0}
.modal select,.modal input[type=time],.modal input[type=text],.modal input[type=date]{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;outline:none;-webkit-appearance:none}
.modal select option{background:var(--bg3)}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.mbtn{padding:12px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer}
.mbtn.ok{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);color:var(--text);border:0.5px solid var(--border2);border-radius:99px;padding:8px 18px;font-size:13px;opacity:0;transition:all .25s;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center">
    <a href="index.html" class="back-btn">←</a>
    <span class="topbar-title">스케줄</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <button class="week-nav" id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="week-nav" id="nextWeek">›</button>
  </div>
</div>

<!-- 요일 헤더 (시간축 너비 맞춤) -->
<div style="display:flex;padding:0 4px">
  <div style="width:32px;flex-shrink:0"></div>
  <div class="day-headers" id="dayHeaders" style="flex:1"></div>
</div>

<!-- 타임라인 -->
<div class="cal-scroll" id="calScroll">
  <div class="cal-inner" style="padding:0 4px">
    <div class="time-col" id="timeCol"></div>
    <div class="tl-grid" id="tlGrid"></div>
  </div>
</div>

</div>

<div style="padding:8px 10px 0"><button onclick="openAddModal()" style="width:100%;padding:10px;background:var(--bg2);border:0.5px dashed var(--border2);border-radius:10px;color:var(--text2);font-size:12px;cursor:pointer">+ 세션 추가</button></div>
<div style="padding:6px 10px 0"><button onclick="openAddModal()" style="width:100%;padding:10px;background:var(--bg2);border:0.5px dashed var(--border2);border-radius:10px;color:var(--text2);font-size:12px;cursor:pointer">+ 세션 추가</button></div>
<div class="divider"><span>바로가기</span></div>
<div class="qlinks">
  <a href="index.html" class="qlink">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>홈
  </a>
  <a href="conquest.html" class="qlink">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>정복지도
  </a>
  <a href="korean.html" class="qlink">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>국어
  </a>
</div>

<!-- 세션 추가 모달 -->
<div class="mback" id="mback">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">세션 추가</div>
    <div class="mrow"><span class="mlbl">날짜</span><input type="date" id="mDate"></div>
    <div class="mrow"><span class="mlbl">과목</span>
      <select id="mSubject">
        <option value="korean">국어</option><option value="math">수학</option>
        <option value="eng">영어</option><option value="social">사회</option>
        <option value="science">과학</option><option value="exercise">운동</option>
      </select>
    </div>
    <div class="mrow"><span class="mlbl">시작</span><input type="time" id="mStart" value="09:00"></div>
    <div class="mrow"><span class="mlbl">종료</span><input type="time" id="mEnd" value="10:00"></div>
    <div class="mrow"><span class="mlbl">메모</span><input type="text" id="mMemo" placeholder="선택사항"></div>
    <div class="mbtns">
      <button class="mbtn" id="mCancel">취소</button>
      <button class="mbtn ok" id="mConfirm">추가</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyC9QBrj_8YSvT1Nk7CsTPu_vKk-zetdmnU",
  authDomain:"neipclover88-3db3f.firebaseapp.com",
  databaseURL:"https://neipclover88-3db3f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"neipclover88-3db3f",
  storageBucket:"neipclover88-3db3f.firebasestorage.app",
  messagingSenderId:"419747329488",
  appId:"1:419747329488:web:a506aad1485222c548f5d5"
};
const db = getDatabase(initializeApp(FB));

// ── 상수 ──
const H_START = 6, H_END = 23, TOTAL_H = H_END - H_START;
const PX_PER_MIN = () => PX_PER_H / 60;
// 화면 높이에서 상단 UI 빼고 타임라인이 꽉 차도록
function calcPxPerH(){
  const topbarH = document.querySelector('.topbar')?.offsetHeight||48;
  const hdrH = document.getElementById('dayHeaders')?.offsetHeight||36;
  const avail = window.innerHeight - topbarH - hdrH - 8;
  return Math.max(24, Math.floor(avail / TOTAL_H));
}
let PX_PER_H = 28;
const DAYS = ['일','월','화','수','목','금','토'];
const SUBJ = {
  korean:  {label:'국어', color:'#4f8ef7', bg:'rgba(79,142,247,0.18)', dashKey:'국어'},
  math:    {label:'수학', color:'#1d9e75', bg:'rgba(29,158,117,0.18)', dashKey:'수학'},
  eng:     {label:'영어', color:'#ef9f27', bg:'rgba(239,159,39,0.18)', dashKey:'영어'},
  social:  {label:'사회', color:'#a855f7', bg:'rgba(168,85,247,0.18)', dashKey:'사회'},
  science: {label:'과학', color:'#d4537e', bg:'rgba(212,83,126,0.18)', dashKey:'과학'},
  exercise:{label:'운동', color:'#f97316', bg:'rgba(249,115,22,0.18)', dashKey:null},
};
// 구역: 배경색만 (11시, 17시 구분선)
const ZONES = [
  {start:6,  end:11, bg:'rgba(239,159,39,0.04)'},
  {start:11, end:17, bg:'rgba(29,158,117,0.04)'},
  {start:17, end:23, bg:'rgba(120,100,220,0.04)'},
];

// ── 상태 ──
let weekOff=0, sessions={}, goals={};


// ── 유틸 ──
function weekDates(off=0){
  const t=new Date(), dow=t.getDay();
  const mon=new Date(t); mon.setDate(t.getDate()-((dow+6)%7)+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function toMin(timeStr){const[h,m]=timeStr.split(':').map(Number);return h*60+m;}
function fromMin(totalMin){const h=Math.floor(totalMin/60),m=totalMin%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;}
function snap10(m){return Math.round(m/10)*10;}
function minToPx(min){return(min-H_START*60)*PX_PER_MIN();}
function pxToMin(px){return px/PX_PER_MIN()+H_START*60;}
function clampMin(m){return Math.max(H_START*60, Math.min(H_END*60, m));}
function zoneName(h){return h<11?'아침':h<17?'점심':'저녁';}
function fmtSec(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
function fmtMin(m){return m>=60?(m%60===0?`${m/60}h`:`${Math.floor(m/60)}h${m%60}m`):`${m}m`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function getGoalPct(dashKey){
  if(!dashKey||!goals[dashKey]) return null;
  const arr=Array.isArray(goals[dashKey])?goals[dashKey]:Object.values(goals[dashKey]);
  const tot=arr.reduce((a,x)=>a+(Number(x.targetVal)||0),0);
  const comp=arr.reduce((a,x)=>a+(Number(x.completedVal)||0),0);
  return tot>0?Math.min(100,Math.round(comp/tot*100)):null;
}

// ── 렌더 ──
function render(){
  PX_PER_H = calcPxPerH();
  const dates=weekDates(weekOff);
  const d0=dates[0],d6=dates[6];
  document.getElementById('weekLabel').textContent=
    `${d0.getMonth()+1}.${String(d0.getDate()).padStart(2,'0')} ~ ${d6.getMonth()+1}.${String(d6.getDate()).padStart(2,'0')}`;

  // 요일 헤더
  const hdr=document.getElementById('dayHeaders');
  hdr.innerHTML='';
  dates.forEach(d=>{
    const dateKey=dk(d);
    const daySessions=Object.values(sessions[dateKey]||{});
    const studyMin=daySessions.filter(x=>!x.live&&x.subject!=='exercise').reduce((a,x)=>a+(toMin(x.end)-toMin(x.start)),0);
    const totalStr=studyMin>0?(studyMin>=60?`${Math.floor(studyMin/60)}h${studyMin%60?studyMin%60+'m':''}`:`${studyMin}m`):'';
    const div=document.createElement('div');
    div.className='dh'+(isToday(d)?' today':'');
    div.innerHTML=`<span class="d-dayrow">${DAYS[d.getDay()]} <span class="dn">${d.getDate()}</span></span>${totalStr?`<span class="d-total">${totalStr}</span>`:'<span class="d-total" style="visibility:hidden">-</span>'}`;
    hdr.appendChild(div);
  });

  const totalPx = TOTAL_H * PX_PER_H;

  // 시간축
  const tc=document.getElementById('timeCol');
  tc.innerHTML=''; tc.style.height=totalPx+'px';
  for(let h=H_START;h<=H_END;h++){
    const lbl=document.createElement('div');
    lbl.className='time-lbl';
    lbl.style.top=((h-H_START)*PX_PER_H)+'px';
    lbl.textContent=h+'시';
    tc.appendChild(lbl);
  }

  // 타임라인 그리드
  const grid=document.getElementById('tlGrid');
  grid.innerHTML=''; grid.style.height=totalPx+'px';

  dates.forEach((d,di)=>{
    const col=document.createElement('div');
    col.className='tl-col';
    col.style.height=totalPx+'px';

    // 구역 배경 + 구분선
    ZONES.forEach(z=>{
      const bg=document.createElement('div');
      bg.className='zone-bg';
      bg.style.cssText=`top:${(z.start-H_START)*PX_PER_H}px;height:${(z.end-z.start)*PX_PER_H}px;background:${z.bg}`;
      col.appendChild(bg);
    });

    // 시간 눈금선
    for(let h=H_START;h<=H_END;h++){
      const line=document.createElement('div');
      line.className='h-line '+(h===11||h===17?'zone':h%1===0?'major':'minor');
      line.style.top=((h-H_START)*PX_PER_H)+'px';
      col.appendChild(line);
      // 30분 보조선
      if(h<H_END){
        const half=document.createElement('div');
        half.className='h-line minor';
        half.style.top=((h-H_START)*PX_PER_H+PX_PER_H/2)+'px';
        col.appendChild(half);
      }
    }

    // 현재 시각선
    if(isToday(d)){
      const now=new Date();
      const nowMin=now.getHours()*60+now.getMinutes();
      if(nowMin>=H_START*60&&nowMin<=H_END*60){
        const nl=document.createElement('div');
        nl.className='now-line';
        nl.style.top=minToPx(nowMin)+'px';
        nl.innerHTML='<div class="now-dot"></div>';
        col.appendChild(nl);
      }
    }

    // 세션 블록
    const dateKey=dk(d);
    Object.entries(sessions[dateKey]||{}).forEach(([sid,s])=>{
      const subj=SUBJ[s.subject]||SUBJ.korean;
      const startMin=toMin(s.start), endMin=toMin(s.end);
      if(endMin<=H_START*60||startMin>=H_END*60) return;
      const top=minToPx(Math.max(startMin,H_START*60));
      const bot=minToPx(Math.min(endMin,H_END*60));
      const height=Math.max(bot-top,14);
      const durMin=endMin-startMin;

      const goalPct=getGoalPct(subj.dashKey);
      const dayTotal=Object.values(sessions[dateKey]||{})
        .filter(x=>x.subject===s.subject&&!x.live)
        .reduce((a,x)=>a+(toMin(x.end)-toMin(x.start)),0);
      const pct=goalPct!==null?goalPct:Math.min(100,Math.round(dayTotal/120*100));
      const fillClr=pct>=100?'#27c96e':subj.color;
      // 오늘 세션은 밝게, 과거는 어둡게
      const isDateToday=isToday(d);
      const barBg=isDateToday?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.06)';
      const barFill=isDateToday?fillClr:fillClr+'88';

      const block=document.createElement('div');
      block.className='sblock'+(s.live?' live':'');
      const blockBg=isDateToday?subj.bg:subj.bg.replace(/[\d.]+\)$/,'0.10)');
      block.style.cssText=`top:${top}px;height:${height}px;background:${blockBg};border-color:${subj.color};${s.live?'border-style:dashed':''}${!isDateToday?';opacity:0.75':''}`;
      block.innerHTML=`
        <div class="resize-handle top" data-type="top"></div>
        <div class="sblock-inner">
          <div class="sblock-label" style="color:${subj.color}">${subj.label}<span style="font-weight:400;font-size:9px">${s.live?'⏱':fmtMin(durMin)}</span></div>
          ${!s.live&&height>22?`<div class="sblock-bar-wrap" style="background:${barBg}"><div class="sblock-bar-fill" style="width:${pct}%;background:${barFill}"></div></div>`:''}
        </div>
        <div class="resize-handle bot" data-type="bot"></div>`;

      // 삭제 (탭)
      block.querySelector('.sblock-inner').addEventListener('click', e=>{
        e.stopPropagation();
        if(confirm(`${subj.label} ${s.start}~${s.end}\n삭제할까요?`))
          remove(ref(db,`bdh3_t/schedule/sessions/${dateKey}/${sid}`));
      });

      // ── 드래그 이동 ──
      let dragging=false, dragTimer=null, ghost=null, dragOffsetY=0;
      let dragNewStart=startMin, dragNewEnd=endMin, dragNewCol=di;

      block.addEventListener('pointerdown', e=>{
        if(e.target.classList.contains('resize-handle')) return;
        e.preventDefault(); e.stopPropagation();
        block.setPointerCapture(e.pointerId);
        dragOffsetY = e.clientY - col.getBoundingClientRect().top - top;
        dragNewStart=startMin; dragNewEnd=endMin; dragNewCol=di;
        dragTimer = setTimeout(()=>{
          dragging=true;
          block.classList.add('dragging');
          ghost=document.createElement('div');
          ghost.className='drag-ghost';
          ghost.style.cssText=`background:${subj.bg};border-color:${subj.color};color:${subj.color};min-width:70px;pointer-events:none`;
          ghost.textContent=`${subj.label} ${fromMin(startMin)}`;
          document.body.appendChild(ghost);
          ghost.style.left=(e.clientX-35)+'px';
          ghost.style.top=(e.clientY-12)+'px';
        },350);
      });

      block.addEventListener('pointermove', e=>{
        if(!dragging) return;
        e.preventDefault();
        ghost.style.left=(e.clientX-35)+'px';
        ghost.style.top=(e.clientY-12)+'px';

        const gridRect=grid.getBoundingClientRect();
        const colW=gridRect.width/7;
        dragNewCol=Math.max(0,Math.min(6,Math.floor((e.clientX-gridRect.left)/colW)));

        const relY=e.clientY - gridRect.top - dragOffsetY;
        const rawMin=pxToMin(relY);
        dragNewStart=clampMin(snap10(rawMin));
        dragNewEnd=clampMin(dragNewStart+durMin);

        block.style.top=minToPx(dragNewStart)+'px';
        if(ghost) ghost.textContent=`${subj.label} ${fromMin(dragNewStart)}`;
      });

      block.addEventListener('pointerup', e=>{
        clearTimeout(dragTimer);
        block.classList.remove('dragging');
        if(ghost){ghost.remove();ghost=null;}
        if(!dragging){dragging=false;return;}
        dragging=false;

        const targetDate=dk(weekDates(weekOff)[dragNewCol]);
        const ns=fromMin(dragNewStart), ne=fromMin(dragNewEnd);
        if(targetDate===dateKey && ns===s.start){return;}

        remove(ref(db,`bdh3_t/schedule/sessions/${dateKey}/${sid}`));
        push(ref(db,`bdh3_t/schedule/sessions/${targetDate}`),{
          subject:s.subject,start:ns,end:ne,duration:(dragNewEnd-dragNewStart)*60,memo:s.memo||''
        });
        toast(`${subj.label} → ${ns}`);
      });

      block.addEventListener('pointercancel',()=>{
        clearTimeout(dragTimer); dragging=false;
        block.classList.remove('dragging');
        if(ghost){ghost.remove();ghost=null;}
        block.style.top=top+'px';
      });

      // ── 리사이즈 ──
      ['top','bot'].forEach(hType=>{
        const handle=block.querySelector(`.resize-handle.${hType}`);
        let rsStartY=0, rsOrigStart=startMin, rsOrigEnd=endMin, rsActive=false;
        let rsNs=startMin, rsNe=endMin;

        handle.addEventListener('pointerdown',e=>{
          e.preventDefault(); e.stopPropagation();
          handle.setPointerCapture(e.pointerId);
          rsActive=true;
          rsStartY=e.clientY;
          rsOrigStart=startMin; rsOrigEnd=endMin;
          rsNs=startMin; rsNe=endMin;
        });
        handle.addEventListener('pointermove',e=>{
          if(!rsActive) return;
          e.preventDefault();
          const deltaMin=snap10((e.clientY-rsStartY)/PX_PER_MIN());
          let ns=rsOrigStart, ne=rsOrigEnd;
          if(hType==='top'){
            ns=clampMin(Math.min(rsOrigStart+deltaMin, rsOrigEnd-10));
          } else {
            ne=clampMin(Math.max(rsOrigEnd+deltaMin, rsOrigStart+10));
          }
          rsNs=ns; rsNe=ne;
          const newTop=minToPx(ns);
          const newH=Math.max(minToPx(ne)-newTop,14);
          block.style.top=newTop+'px';
          block.style.height=newH+'px';
          const lbl=block.querySelector('.sblock-label');
          if(lbl) lbl.innerHTML=`${subj.label} <span style="font-weight:400;font-size:9px">${fmtMin(ne-ns)}</span>`;
        });
        handle.addEventListener('pointerup',e=>{
          if(!rsActive) return;
          rsActive=false;
          if(rsNs===startMin&&rsNe===endMin) return;
          remove(ref(db,`bdh3_t/schedule/sessions/${dateKey}/${sid}`));
          push(ref(db,`bdh3_t/schedule/sessions/${dateKey}`),{
            subject:s.subject,start:fromMin(rsNs),end:fromMin(rsNe),
            duration:(rsNe-rsNs)*60,memo:s.memo||''
          });
          toast(`${subj.label} ${fromMin(rsNs)}~${fromMin(rsNe)}`);
        });
      });

      col.appendChild(block);
    });

    // ── 탭으로 세션 추가 ──
    col.addEventListener('pointerup', e=>{
      // 블록이나 핸들 위면 무시
      if(e.target.closest('.sblock')) return;
      if(e.target.closest('.resize-handle')) return;
      // 짧은 탭만 (드래그 아닌 경우)
      if(e.target._wasDragged) return;

      const gridRect = grid.getBoundingClientRect();
      const relY = e.clientY - gridRect.top;
      const rawMin = pxToMin(relY);
      const snapped = snap10(rawMin);
      const startSnapped = clampMin(snapped);
      const endSnapped = clampMin(snapped + 60);

      const dateStr = dk(weekDates(weekOff)[di]);
      document.getElementById('mDate').value = dateStr;
      document.getElementById('mStart').value = fromMin(startSnapped);
      document.getElementById('mEnd').value = fromMin(endSnapped);
      document.getElementById('mback').classList.add('open');
    });

    grid.appendChild(col);
  });

  // 현재 시각선 1분마다 갱신
  clearInterval(window._nowTimer);
  window._nowTimer=setInterval(()=>{
    document.querySelectorAll('.now-line').forEach(el=>el.remove());
    const todayCol=document.querySelectorAll('.tl-col')[weekDates(weekOff).findIndex(d=>isToday(d))];
    if(!todayCol) return;
    const now=new Date(), nowMin=now.getHours()*60+now.getMinutes();
    if(nowMin>=H_START*60&&nowMin<=H_END*60){
      const nl=document.createElement('div');
      nl.className='now-line'; nl.style.top=minToPx(nowMin)+'px';
      nl.innerHTML='<div class="now-dot"></div>';
      todayCol.appendChild(nl);
    }
  },60000);
}

// ── Firebase ──
onValue(ref(db,'bdh3_t/schedule/sessions'),snap=>{sessions=snap.val()||{};render();});
onValue(ref(db,'bdh3/db/_goals'),snap=>{
  const raw=snap.val()||{};
  Object.keys(raw).forEach(k=>{goals[k]=Array.isArray(raw[k])?raw[k]:Object.values(raw[k]);});
  render();
});



// ── 모달 ──
window.openAddModal=function(dateStr){
  document.getElementById('mDate').value=dateStr||dk(new Date());
  document.getElementById('mback').classList.add('open');
};
document.getElementById('mCancel').onclick=()=>document.getElementById('mback').classList.remove('open');
document.getElementById('mback').onclick=e=>{if(e.target===document.getElementById('mback'))document.getElementById('mback').classList.remove('open');};
document.getElementById('mConfirm').onclick=()=>{
  const dateVal=document.getElementById('mDate').value||dk(new Date());
  const subj=document.getElementById('mSubject').value;
  const s=document.getElementById('mStart').value;
  const e=document.getElementById('mEnd').value;
  const memo=document.getElementById('mMemo').value;
  if(!s||!e||s>=e){toast('시간을 확인하세요');return;}
  const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  push(ref(db,`bdh3_t/schedule/sessions/${dateVal}`),{subject:subj,start:s,end:e,duration:(eh*60+em-sh*60-sm)*60,memo});
  document.getElementById('mback').classList.remove('open');
  document.getElementById('mMemo').value='';
  toast('세션이 추가되었습니다');
};

// ── 네비 ──
document.getElementById('prevWeek').onclick=()=>{weekOff--;render();};
document.getElementById('nextWeek').onclick=()=>{weekOff++;render();};

window.addEventListener('resize',render);

// ── 스크롤 오늘 시각으로 ──
function scrollToNow(){
  const scr=document.getElementById('calScroll');
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const px=minToPx(nowMin)-window.innerHeight*0.3;
  scr.scrollTop=Math.max(0,px);
}

setTimeout(scrollToNow,100);
</script>
