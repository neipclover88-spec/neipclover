<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>연우 스케줄</title>
<style>
:root {
  --bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e22;--bg4:#26262b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f2;--text2:#9898a6;--text3:#55555f;
  --accent:#4f8ef7;--accent-bg:rgba(79,142,247,0.15);--accent-bd:rgba(79,142,247,0.4);
  --red:#e24b4a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Pretendard',sans-serif;overscroll-behavior:none}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
.back-btn{font-size:18px;color:var(--text2);text-decoration:none}
.topbar-title{font-size:15px;font-weight:600;margin-left:8px}
.week-nav{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:2px 6px}
.week-label{font-size:12px;color:var(--text2);min-width:80px;text-align:center}

/* 캘린더 */
.cal-outer{display:flex;padding:6px 4px 0;gap:0}
.time-axis{width:30px;flex-shrink:0;position:relative}
.time-tick{position:absolute;right:4px;font-size:9px;color:var(--text3);line-height:1;transform:translateY(-50%);white-space:nowrap}
.cal-inner{flex:1;min-width:0}
.day-headers{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;margin-bottom:2px;height:32px}
.dh{text-align:center;font-size:10px;color:var(--text2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.dh .dn{font-size:13px;font-weight:500}
.dh.today{color:var(--accent)}
.dh.today .dn{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px}

/* 구역 */
.zone-wrap{display:flex;flex-direction:column;gap:2px}
.zone-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;border-radius:6px;overflow:hidden}

/* 셀 */
.zcell{padding:4px 3px;position:relative;cursor:pointer;display:flex;flex-direction:column;gap:3px;min-height:0}
.zcell.today-cell{outline:1.5px solid var(--accent-bd);outline-offset:-1px;border-radius:2px}

/* 세션 블록 — 목업 스타일 */
.sblock{border-radius:5px;padding:5px 6px 4px;cursor:pointer;width:100%;min-width:0;flex-shrink:0;border:none;box-sizing:border-box}
.sblock:active{opacity:0.7}
.sblock.live{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.sblock-label{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;display:flex;align-items:baseline;gap:3px}
.sblock-time{font-size:9px;font-weight:500;opacity:0.85}
.sblock-bar{height:4px;border-radius:2px;overflow:hidden;margin-top:6px}
.sblock-fill{height:100%;border-radius:2px;transition:width .4s}

/* 구분선 */
.divider{display:flex;align-items:center;gap:8px;padding:10px 12px 6px}
.divider span{font-size:11px;color:var(--text3);font-weight:500}
.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* 타이머 */
.timer-sec{padding:0 10px 10px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{font-size:12px;padding:5px 12px;border-radius:99px;border:0.5px solid var(--border2);color:var(--text2);background:var(--bg2);cursor:pointer;transition:all .15s}
.pill:active{transform:scale(.95)}
.timer-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:14px;padding:14px}
.timer-status{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.zone-badge{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border)}
.tdot{width:8px;height:8px;border-radius:50%;background:var(--text3)}
.tdot.run{background:var(--red);animation:blink 1s step-end infinite}
.tdot.pause{background:#ef9f27}
@keyframes blink{50%{opacity:0}}
.ttime{text-align:center;font-size:48px;font-weight:300;letter-spacing:3px;margin:4px 0;font-variant-numeric:tabular-nums}
.tlbl{text-align:center;font-size:12px;color:var(--text2);margin-bottom:12px}
.tbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 4px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.tbtn:active{transform:scale(.96)}
.tbtn svg{width:20px;height:20px}
.tbtn.go{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.tbtn.stop{background:rgba(226,75,74,.12);border-color:rgba(226,75,74,.3);color:var(--red)}
.tbtn:disabled{opacity:.35;pointer-events:none}

/* 링크 */
.qlinks{display:flex;gap:8px;padding:0 10px 16px}
.qlink{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;text-decoration:none}
.qlink:active{background:var(--bg3)}

/* 모달 */
.mback{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;justify-content:center}
.mback.open{display:flex}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;border-top:0.5px solid var(--border2);padding:16px 16px 32px;width:100%;max-width:600px}
.mhandle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 14px}
.mtitle{font-size:14px;font-weight:600;margin-bottom:14px}
.mrow{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.mlbl{font-size:12px;color:var(--text2);width:40px;flex-shrink:0}
.modal select,.modal input[type=time],.modal input[type=text],.modal input[type=date]{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;outline:none;-webkit-appearance:none}
.modal select option{background:var(--bg3)}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.mbtn{padding:12px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer}
.mbtn.ok{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}

.drag-ghost{position:fixed;z-index:500;pointer-events:none;opacity:0.85;border-radius:6px;padding:7px 8px 6px;font-size:12px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.4);transform:scale(1.05)}
.zcell.drag-over{outline:2px solid var(--accent);outline-offset:-2px;border-radius:3px;background:rgba(79,142,247,0.08)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--text);border:0.5px solid var(--border2);border-radius:99px;padding:8px 18px;font-size:13px;opacity:0;transition:all .25s;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center">
    <a href="index.html" class="back-btn">←</a>
    <span class="topbar-title">스케줄</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <button class="week-nav" id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="week-nav" id="nextWeek">›</button>
  </div>
</div>

<div class="cal-outer">
  <div class="time-axis" id="timeAxis"></div>
  <div class="cal-inner">
    <div class="day-headers" id="dayHeaders"></div>
    <div class="zone-wrap" id="zoneWrap"></div>
  </div>
</div>

<div class="divider"><span>타이머</span></div>
<div class="timer-sec">
  <div class="pills" id="pills"></div>
  <div class="timer-card">
    <div class="timer-status">
      <span class="zone-badge" id="timerZone">— 구역</span>
      <div class="tdot" id="tdot"></div>
    </div>
    <div class="ttime" id="ttime">00:00:00</div>

    <div class="tbtns">
      <button class="tbtn" id="btnPause" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지
      </button>
      <button class="tbtn go" id="btnStart">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>시작
      </button>
      <button class="tbtn stop" id="btnStop" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>종료
      </button>
    </div>
  </div>
  <button onclick="openAddModal()" style="width:100%;margin-top:8px;padding:10px;background:var(--bg2);border:0.5px dashed var(--border2);border-radius:10px;color:var(--text2);font-size:12px;cursor:pointer;">+ 과거 세션 직접 추가</button>
</div>

<div class="divider"><span>바로가기</span></div>
<div class="qlinks">
  <a href="index.html" class="qlink">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>홈
  </a>
  <a href="conquest.html" class="qlink">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>정복지도
  </a>
  <a href="korean.html" class="qlink">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>국어
  </a>
</div>

<div class="mback" id="mback">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">세션 추가</div>
    <div class="mrow"><span class="mlbl">날짜</span>
      <input type="date" id="mDate">
    </div>
    <div class="mrow"><span class="mlbl">과목</span>
      <select id="mSubject">
        <option value="korean">국어</option><option value="math">수학</option>
        <option value="eng">영어</option><option value="social">사회</option>
        <option value="science">과학</option>
      </select>
    </div>
    <div class="mrow"><span class="mlbl">시작</span><input type="time" id="mStart" value="09:00"></div>
    <div class="mrow"><span class="mlbl">종료</span><input type="time" id="mEnd" value="10:00"></div>
    <div class="mrow"><span class="mlbl">메모</span><input type="text" id="mMemo" placeholder="선택사항"></div>
    <div class="mbtns">
      <button class="mbtn" id="mCancel">취소</button>
      <button class="mbtn ok" id="mConfirm">추가</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyC9QBrj_8YSvT1Nk7CsTPu_vKk-zetdmnU",
  authDomain:"neipclover88-3db3f.firebaseapp.com",
  databaseURL:"https://neipclover88-3db3f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"neipclover88-3db3f",
  storageBucket:"neipclover88-3db3f.firebasestorage.app",
  messagingSenderId:"419747329488",
  appId:"1:419747329488:web:a506aad1485222c548f5d5"
};
const db = getDatabase(initializeApp(FB));

// ── 상수 ──
const SUBJ = {
  korean:  {label:'국어', color:'#4f8ef7', bg:'rgba(79,142,247,0.18)',  dashKey:'국어'},
  math:    {label:'수학', color:'#1d9e75', bg:'rgba(29,158,117,0.18)',  dashKey:'수학'},
  eng:     {label:'영어', color:'#ef9f27', bg:'rgba(239,159,39,0.18)',  dashKey:'영어'},
  social:  {label:'사회', color:'#a855f7', bg:'rgba(168,85,247,0.18)',  dashKey:'사회'},
  science: {label:'과학', color:'#d4537e', bg:'rgba(212,83,126,0.18)', dashKey:'과학'},
};
const ZONES = [
  {key:'am',   hrs:5, start:6,  end:11, bg:'rgba(239,159,39,0.05)'},
  {key:'noon', hrs:6, start:11, end:17, bg:'rgba(29,158,117,0.05)'},
  {key:'pm',   hrs:6, start:17, end:23, bg:'rgba(120,100,220,0.05)'},
];
const TOTAL_HRS = 17;
const DAYS = ['일','월','화','수','목','금','토'];

// ── 상태 ──
let weekOff=0, sessions={}, goals={};
let tInterval=null, tStart=null, tElapsed=0, tRunning=false, tPaused=false;
let selSubj=null, modalDate=null;

// ── 유틸 ──
function weekDates(off=0){
  const t=new Date(),dow=t.getDay();
  const mon=new Date(t);mon.setDate(t.getDate()-((dow+6)%7)+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function zoneName(h){return h<11?'아침':h<17?'점심':'저녁';}
function sesMin(s){const[sh,sm]=s.start.split(':').map(Number),[eh,em]=s.end.split(':').map(Number);return(eh*60+em)-(sh*60+sm);}
function fmtSec(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
function fmtMin(m){return m>=60?(m%60===0?`${m/60}h`:`${Math.floor(m/60)}h${m%60}m`):`${m}m`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ── 목표 진척도 계산 (bdh3/db/_goals) ──
function getGoalPct(subjKey) {
  const g = goals[subjKey];
  if (!g || !g.length) return null;
  const arr = Array.isArray(g) ? g : Object.values(g);
  const tot = arr.reduce((a,x)=>a+(Number(x.targetVal)||0),0);
  const comp= arr.reduce((a,x)=>a+(Number(x.completedVal)||0),0);
  if (!tot) return null;
  return Math.min(100, Math.round(comp/tot*100));
}

// ── 캘린더 렌더 ──
function render(){
  const dates=weekDates(weekOff);
  const d0=dates[0],d6=dates[6];
  document.getElementById('weekLabel').textContent=
    `${d0.getMonth()+1}.${String(d0.getDate()).padStart(2,'0')} ~ ${d6.getMonth()+1}.${String(d6.getDate()).padStart(2,'0')}`;

  // 요일 헤더
  const hdr=document.getElementById('dayHeaders');
  hdr.innerHTML='';
  dates.forEach(d=>{
    const div=document.createElement('div');
    div.className='dh'+(isToday(d)?' today':'');
    div.innerHTML=`${DAYS[d.getDay()]}<span class="dn">${d.getDate()}</span>`;
    hdr.appendChild(div);
  });

  // 구역 행
  const wrap=document.getElementById('zoneWrap');
  wrap.innerHTML='';
  const totalH=Math.max(window.innerHeight*0.85,400);

  ZONES.forEach(zone=>{
    const row=document.createElement('div');
    row.className='zone-row';
    const zoneH=Math.round(totalH*(zone.hrs/TOTAL_HRS));
    row.style.cssText=`background:${zone.bg};height:${zoneH}px`;

    dates.forEach(d=>{
      const key=dk(d);
      const cell=document.createElement('div');
      cell.className='zcell'+(isToday(d)?' today-cell':'');

      const daySes=Object.entries(sessions[key]||{})
        .filter(([,s])=>{const h=parseInt(s.start);return h>=zone.start&&h<zone.end;});

      daySes.forEach(([sid,s])=>{
          const subj=SUBJ[s.subject]||SUBJ.korean;
          const min=sesMin(s);

          // 진척도: 대시보드 목표에서 가져옴
          const goalPct = getGoalPct(subj.dashKey);
          // 오늘 해당 과목 누적 시간 기반 진척도 (목표 없을 때 fallback: 120분 기준)
          const dayTotal=Object.values(sessions[key]||{})
            .filter(x=>x.subject===s.subject)
            .reduce((a,x)=>a+sesMin(x),0);
          const timePct=Math.min(100,Math.round(dayTotal/120*100));

          const pct = goalPct !== null ? goalPct : timePct;
          const barClr = pct>=100?'#27c96e':subj.color;

          const block=document.createElement('div');
          block.className='sblock'+(s.live?' live':'');
          // 목업처럼 밝은 배경
          block.style.cssText=`background:${subj.bg};`;
          const fillClr = pct>=100 ? '#27c96e' : subj.color;
          block.innerHTML=`
            <div class="sblock-label" style="color:${subj.color}">
              ${subj.label}<span class="sblock-time">${fmtMin(min)}</span>
            </div>
            <div class="sblock-bar" style="background:rgba(255,255,255,0.1)">
              <div class="sblock-fill" style="width:${pct}%;background:${fillClr}"></div>
            </div>`;

          block.addEventListener('click',e=>{
            e.stopPropagation();
            if(confirm(`세션 삭제?\n${subj.label} ${s.start}~${s.end}`))
              remove(ref(db,`bdh3_t/schedule/sessions/${key}/${sid}`));
          });

          // ── 길게 눌러 드래그 이동 (10분 스냅) ──
          let dragTimer=null, isDragging=false, ghost=null;
          function snap10(totalMin){ return Math.round(totalMin/10)*10; }

          block.addEventListener('pointerdown', e=>{
            e.stopPropagation();
            dragTimer = setTimeout(()=>{
              isDragging = true;
              block.style.opacity='0.35';
              ghost = document.createElement('div');
              ghost.className = 'drag-ghost';
              ghost.style.cssText = `background:${subj.bg};color:${subj.color};min-width:70px;font-size:12px;font-weight:700;padding:6px 10px;border-left:3px solid ${subj.color}`;
              ghost.textContent = subj.label + ' ' + fmtMin(min);
              document.body.appendChild(ghost);
              ghost.style.left = (e.clientX - 35) + 'px';
              ghost.style.top  = (e.clientY - 20) + 'px';
            }, 500);
          });

          block.addEventListener('pointermove', e=>{
            if(!isDragging) return;
            e.preventDefault();
            ghost.style.left = (e.clientX - 35) + 'px';
            ghost.style.top  = (e.clientY - 20) + 'px';
            document.querySelectorAll('.zcell').forEach(c=>c.classList.remove('drag-over'));
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const tc = el?.closest('.zcell');
            if(tc) tc.classList.add('drag-over');
          });

          block.addEventListener('pointerup', e=>{
            clearTimeout(dragTimer);
            if(!isDragging){ block.style.opacity=''; return; }
            isDragging=false; block.style.opacity='1';
            if(ghost){ghost.remove();ghost=null;}
            document.querySelectorAll('.zcell').forEach(c=>c.classList.remove('drag-over'));

            const el = document.elementFromPoint(e.clientX, e.clientY);
            const targetCell = el?.closest('.zcell');
            if(!targetCell) return;

            // 타겟 구역 찾기
            const targetRow = targetCell.closest('.zone-row');
            if(!targetRow) return;
            const allRows = [...document.querySelectorAll('.zone-row')];
            const zoneIdx = allRows.indexOf(targetRow);
            if(zoneIdx<0) return;
            const targetZone = ZONES[zoneIdx];
            if(!targetZone) return;

            // 타겟 날짜 찾기
            const allCells = [...targetRow.querySelectorAll('.zcell')];
            const colIdx = allCells.indexOf(targetCell);
            const targetDates = weekDates(weekOff);
            if(colIdx<0||colIdx>=targetDates.length) return;
            const targetDateKey = dk(targetDates[colIdx]);

            // 셀 안 Y 위치 → 시간 계산 (10분 스냅)
            const cellRect = targetCell.getBoundingClientRect();
            const yRatio = Math.max(0, Math.min(1, (e.clientY - cellRect.top) / cellRect.height));
            const zoneMinutes = (targetZone.end - targetZone.start) * 60;
            const rawMin = targetZone.start * 60 + yRatio * zoneMinutes;
            const snappedMin = snap10(rawMin);
            const newStartH = Math.floor(snappedMin / 60);
            const newStartM = snappedMin % 60;
            const durMin = sesMin(s);
            const endTotalMin = Math.min(snappedMin + durMin, targetZone.end * 60);
            const newEndH = Math.floor(endTotalMin / 60);
            const newEndM = endTotalMin % 60;

            const newStart = `${String(newStartH).padStart(2,'0')}:${String(newStartM).padStart(2,'0')}`;
            const newEnd   = `${String(newEndH).padStart(2,'0')}:${String(newEndM).padStart(2,'0')}`;

            // 같은 위치면 이동 안 함
            if(targetDateKey===key && newStart===s.start) return;

            remove(ref(db,`bdh3_t/schedule/sessions/${key}/${sid}`));
            push(ref(db,`bdh3_t/schedule/sessions/${targetDateKey}`),{
              subject:s.subject, start:newStart, end:newEnd,
              duration:s.duration||0, memo:s.memo||''
            });
            toast(`${subj.label} → ${targetDateKey.slice(5)} ${newStart}`);
          });

          block.addEventListener('pointercancel',()=>{
            clearTimeout(dragTimer); isDragging=false; block.style.opacity='1';
            if(ghost){ghost.remove();ghost=null;}
            document.querySelectorAll('.zcell').forEach(c=>c.classList.remove('drag-over'));
          });
          block.style.touchAction='none';

          cell.appendChild(block);
      });

      // 오늘 현재 구역 빨간점
      if(isToday(d)){
        const now=new Date();
        if(now.getHours()>=zone.start&&now.getHours()<zone.end){
          const dot=document.createElement('div');
          dot.style.cssText='position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:#e24b4a;pointer-events:none';
          cell.appendChild(dot);
        }
      }



      row.appendChild(cell);
    });
    wrap.appendChild(row);
  });

  // 시간축
  const axis=document.getElementById('timeAxis');
  axis.innerHTML='';
  axis.style.cssText=`height:${totalH}px;margin-top:34px;position:relative`;
  for(let h=6;h<=23;h++){
    const tick=document.createElement('div');
    tick.className='time-tick';
    tick.style.top=((h-6)/TOTAL_HRS*100)+'%';
    tick.textContent=h+'시';
    axis.appendChild(tick);
  }
}

// ── Firebase 세션 로드 ──
onValue(ref(db,'bdh3_t/schedule/sessions'),snap=>{
  sessions=snap.val()||{};
  render();
});

// ── Firebase 목표 로드 (bdh3/db/_goals) ──
onValue(ref(db,'bdh3/db/_goals'),snap=>{
  const raw=snap.val()||{};
  // 과목명 → 배열 보정
  Object.keys(raw).forEach(k=>{
    goals[k]=Array.isArray(raw[k])?raw[k]:Object.values(raw[k]);
  });
  render();
});

// ── 타이머 ──
function updTimer(){
  const el=tRunning?tElapsed+Math.floor((Date.now()-tStart)/1000):tElapsed;
  document.getElementById('ttime').textContent=fmtSec(el);
  const now=new Date();
  document.getElementById('timerZone').textContent=zoneName(now.getHours())+' 구역';
  const dot=document.getElementById('tdot'),lbl=document.getElementById('tlbl');
  if(tRunning){dot.className='tdot run';lbl.textContent=`진행중 · ${selSubj?SUBJ[selSubj].label:'—'}`;}
  else if(tPaused){dot.className='tdot pause';lbl.textContent='일시정지됨';}
  else{dot.className='tdot';lbl.textContent=selSubj?`${SUBJ[selSubj].label} · 시작 대기`:'과목을 선택하고 시작하세요';}
}
function startTimer(){
  if(!selSubj){toast('과목을 먼저 선택하세요');return;}
  tRunning=true;tPaused=false;tStart=Date.now();
  tInterval=setInterval(updTimer,1000);
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnPause').disabled=false;
  document.getElementById('btnStop').disabled=false;
  const now=new Date();
  window._lsTime=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  window._lsDate=dk(now);
  updTimer();
}
function pauseTimer(){
  if(!tRunning)return;
  tElapsed+=Math.floor((Date.now()-tStart)/1000);
  tRunning=false;tPaused=true;clearInterval(tInterval);
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnPause').disabled=true;
  updTimer();
}
function resumeTimer(){
  if(!tPaused){startTimer();return;}
  tRunning=true;tPaused=false;tStart=Date.now();
  tInterval=setInterval(updTimer,1000);
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnPause').disabled=false;
  updTimer();
}
function stopTimer(){
  if(!tRunning&&!tPaused)return;
  const total=tElapsed+(tRunning?Math.floor((Date.now()-tStart)/1000):0);
  if(total<60){toast('1분 이상 공부해야 기록됩니다');resetTimer();return;}
  clearInterval(tInterval);
  const now=new Date(),key=dk(now);
  const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0');
  push(ref(db,`bdh3_t/schedule/sessions/${key}`),{
    subject:selSubj,start:window._lsTime||`${hh}:${mm}`,end:`${hh}:${mm}`,duration:total,memo:''
  });
  toast(`${SUBJ[selSubj].label} ${Math.floor(total/60)}분 기록 완료`);
  resetTimer();
}
function resetTimer(){
  tRunning=false;tPaused=false;tElapsed=0;tStart=null;clearInterval(tInterval);
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnPause').disabled=true;
  document.getElementById('btnStop').disabled=true;
  updTimer();
}

// ── 과목 필 ──
function renderPills(){
  const w=document.getElementById('pills');w.innerHTML='';
  Object.entries(SUBJ).forEach(([key,s])=>{
    const p=document.createElement('div');
    p.className='pill';
    if(selSubj===key)p.style.cssText=`background:${s.bg};color:${s.color};border-color:${s.color}`;
    p.textContent=s.label;
    p.onclick=()=>{selSubj=key;renderPills();updTimer();};
    w.appendChild(p);
  });
}

// ── 모달 ──
document.getElementById('mCancel').onclick=()=>document.getElementById('mback').classList.remove('open');
// 모달 열 때 날짜 초기화
function openAddModal(dateKey){
  const d=dateKey||dk(new Date());
  document.getElementById('mDate').value=d;
  document.getElementById('mback').classList.add('open');
}
document.getElementById('mback').onclick=e=>{if(e.target===document.getElementById('mback'))document.getElementById('mback').classList.remove('open');};
// 모달 열릴 때 오늘 날짜 기본값
document.querySelector('button[onclick*="mback"]')?.addEventListener('click',()=>{
  const today=new Date();
  document.getElementById('mDate').value=dk(today);
});
document.getElementById('mConfirm').onclick=()=>{
  const dateVal=document.getElementById('mDate').value||dk(new Date());
  const subj=document.getElementById('mSubject').value;
  const s=document.getElementById('mStart').value;
  const e=document.getElementById('mEnd').value;
  const memo=document.getElementById('mMemo').value;
  if(!s||!e||s>=e){toast('시간을 확인하세요');return;}
  const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  push(ref(db,`bdh3_t/schedule/sessions/${dateVal}`),{subject:subj,start:s,end:e,duration:(eh*60+em-sh*60-sm)*60,memo});
  document.getElementById('mback').classList.remove('open');
  document.getElementById('mMemo').value='';
  toast('세션이 추가되었습니다');
};

// ── 네비 / 버튼 ──
document.getElementById('prevWeek').onclick=()=>{weekOff--;render();};
document.getElementById('nextWeek').onclick=()=>{weekOff++;render();};
document.getElementById('btnStart').onclick=()=>{if(tPaused)resumeTimer();else startTimer();};
document.getElementById('btnPause').onclick=pauseTimer;
document.getElementById('btnStop').onclick=stopTimer;
window.addEventListener('resize',render);

renderPills();updTimer();
</script>
